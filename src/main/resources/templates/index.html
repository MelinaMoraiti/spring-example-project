<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          crossorigin="anonymous">

    <title>Spring</title>
    <meta charset="UTF-8" />

    <style>
        .big-red-btn {
            background-color: #dc3545; /* Bootstrap red */
            color: white;
            border: 3px solid white;
            font-size: 1.5rem;
            padding: 15px 40px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .big-red-btn:hover {
            background-color: #b52a37;
            color: white;
        }
    </style>
</head>

<body style="width: fit-content; padding-top: 3em; margin: auto;">

    <form action="#" th:action="@{/press}" method="post">
        <button class="big-red-btn" type="submit">
            Press here
        </button>
    </form>

    <p style="width: fit-content; margin: auto;" th:text="${press}">
        ...
    </p>

</body>
</html>
